spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:snackoverflow}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  frontend:
    origins: ${APP_FRONTEND_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET}
    access-ttl-seconds: ${JWT_ACCESS_TTL:1800}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL:1209600}
    issuer: snackoverflow

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
